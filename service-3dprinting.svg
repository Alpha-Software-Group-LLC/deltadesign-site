<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <linearGradient id="bg3d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161d2b"/><stop offset="1" stop-color="#090d14"/>
    </linearGradient>
    <filter id="glow3d" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="520" fill="url(#bg3d)"/>
  <g stroke="#1d2738" stroke-width="1">
    <line x1="0" y1="430" x2="900" y2="430"/>
    <line x1="0" y1="470" x2="900" y2="470"/>
    <line x1="150" y1="400" x2="150" y2="520"/>
    <line x1="450" y1="400" x2="450" y2="520"/>
    <line x1="750" y1="400" x2="750" y2="520"/>
  </g>
  <!-- printer frame -->
  <rect x="250" y="372" width="400" height="44" rx="8" fill="#1f2937" stroke="#6b7280" stroke-width="4"/>
  <g stroke="#9ca3af" stroke-width="7" stroke-linecap="round">
    <line x1="300" y1="372" x2="300" y2="118"/>
    <line x1="600" y1="372" x2="600" y2="118"/>
    <line x1="288" y1="120" x2="612" y2="120"/>
  </g>
  <!-- x-axis gantry -->
  <rect x="286" y="188" width="328" height="18" rx="5" fill="#374151" stroke="#6b7280" stroke-width="3"/>
  <!-- print head -->
  <rect x="418" y="196" width="50" height="42" rx="5" fill="#dc2626"/>
  <rect x="430" y="200" width="26" height="6" rx="3" fill="#fca5a5"/>
  <polygon points="435,238 451,238 443,260" fill="#dc2626" filter="url(#glow3d)"/>
  <!-- print bed -->
  <rect x="318" y="352" width="264" height="16" rx="4" fill="#374151" stroke="#6b7280" stroke-width="3"/>
  <!-- printed layered object -->
  <g fill="#dc2626" filter="url(#glow3d)">
    <rect x="416" y="334" width="64" height="9" rx="4"/>
    <rect x="412" y="321" width="72" height="9" rx="4"/>
    <rect x="416" y="308" width="64" height="9" rx="4"/>
    <rect x="423" y="295" width="50" height="9" rx="4"/>
    <rect x="430" y="282" width="36" height="9" rx="4"/>
  </g>
  <!-- filament spool -->
  <circle cx="545" cy="152" r="36" fill="none" stroke="#dc2626" stroke-width="11"/>
  <circle cx="545" cy="152" r="11" fill="#9ca3af"/>
  <path d="M545 188 q-20 30 -77 18" fill="none" stroke="#dc2626" stroke-width="3" opacity="0.8"/>
</svg>
