<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <linearGradient id="bgcnc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161d2b"/><stop offset="1" stop-color="#090d14"/>
    </linearGradient>
    <filter id="glowcnc" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="520" fill="url(#bgcnc)"/>
  <g stroke="#1d2738" stroke-width="1">
    <line x1="0" y1="445" x2="900" y2="445"/>
    <line x1="200" y1="400" x2="200" y2="520"/>
    <line x1="450" y1="400" x2="450" y2="520"/>
    <line x1="700" y1="400" x2="700" y2="520"/>
  </g>
  <!-- machine head / column -->
  <rect x="380" y="70" width="140" height="60" rx="8" fill="#1f2937" stroke="#6b7280" stroke-width="4"/>
  <rect x="430" y="130" width="40" height="70" rx="6" fill="#374151" stroke="#6b7280" stroke-width="3"/>
  <!-- spindle -->
  <rect x="438" y="200" width="24" height="46" rx="4" fill="#9ca3af"/>
  <!-- cutting tool -->
  <polygon points="444,246 456,246 450,286" fill="#dc2626" filter="url(#glowcnc)"/>
  <!-- workpiece block -->
  <rect x="330" y="300" width="240" height="70" rx="4" fill="#2b3545" stroke="#6b7280" stroke-width="3"/>
  <path d="M330 300 h120 l20 -18 h120" fill="none" stroke="#dc2626" stroke-width="4" opacity="0.9"/>
  <!-- machine bed -->
  <rect x="270" y="370" width="360" height="26" rx="5" fill="#1f2937" stroke="#6b7280" stroke-width="4"/>
  <!-- chips / sparks -->
  <g fill="#f59e0b" filter="url(#glowcnc)">
    <polygon points="470,288 482,282 478,296"/>
    <polygon points="430,290 418,284 424,298"/>
    <circle cx="492" cy="296" r="3"/>
    <circle cx="410" cy="300" r="3"/>
  </g>
  <!-- motion arrows -->
  <g stroke="#dc2626" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85">
    <path d="M600 330 h40 m-10 -8 l10 8 l-10 8"/>
    <path d="M450 420 v28 m-8 -10 l8 10 l8 -10"/>
  </g>
</svg>
