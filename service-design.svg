<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <linearGradient id="bgdes" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161d2b"/><stop offset="1" stop-color="#090d14"/>
    </linearGradient>
    <filter id="glowdes" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="520" fill="url(#bgdes)"/>
  <!-- blueprint grid -->
  <g stroke="#1d2738" stroke-width="1">
    <line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="280" x2="900" y2="280"/><line x1="0" y1="360" x2="900" y2="360"/>
    <line x1="0" y1="440" x2="900" y2="440"/>
    <line x1="180" y1="0" x2="180" y2="520"/><line x1="360" y1="0" x2="360" y2="520"/>
    <line x1="540" y1="0" x2="540" y2="520"/><line x1="720" y1="0" x2="720" y2="520"/>
  </g>
  <!-- isometric wireframe product (cube) -->
  <g stroke="#dc2626" stroke-width="3" fill="none" stroke-linejoin="round" filter="url(#glowdes)">
    <polygon points="450,140 580,210 580,350 450,420 320,350 320,210"/>
    <line x1="450" y1="140" x2="450" y2="280"/>
    <line x1="450" y1="280" x2="580" y2="350"/>
    <line x1="450" y1="280" x2="320" y2="350"/>
  </g>
  <g fill="#dc2626"><circle cx="450" cy="140" r="5"/><circle cx="580" cy="210" r="5"/><circle cx="580" cy="350" r="5"/><circle cx="450" cy="420" r="5"/><circle cx="320" cy="350" r="5"/><circle cx="320" cy="210" r="5"/><circle cx="450" cy="280" r="5"/></g>
  <!-- dimension lines -->
  <g stroke="#9ca3af" stroke-width="2" fill="#9ca3af" font-family="monospace" font-size="20">
    <line x1="300" y1="455" x2="600" y2="455"/>
    <polygon points="300,455 312,449 312,461"/>
    <polygon points="600,455 588,449 588,461"/>
    <text x="425" y="448">240mm</text>
    <line x1="630" y1="210" x2="630" y2="350"/>
    <polygon points="630,210 624,222 636,222"/>
    <polygon points="630,350 624,338 636,338"/>
  </g>
  <!-- stylus / pen -->
  <g transform="rotate(40 660 150)">
    <rect x="648" y="80" width="24" height="120" rx="10" fill="#374151" stroke="#9ca3af" stroke-width="3"/>
    <polygon points="648,200 672,200 660,232" fill="#dc2626" filter="url(#glowdes)"/>
  </g>
</svg>
